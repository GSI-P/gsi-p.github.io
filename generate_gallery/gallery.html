
<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>GSIP - Gallery</title>

<link rel="stylesheet" href="style.css">

<style>

/* Gallery title */

.gallery-header {
    text-align: center;
    margin: 40px;
}


/* Masonry style gallery */

.photo-gallery {
    column-count: 4;
    column-gap: 15px;
    padding: 20px;
}


.photo-gallery img {
    width: 100%;
    margin-bottom: 15px;
    border-radius: 12px;
    display: block;

    transition: 
        transform 0.3s ease,
        box-shadow 0.3s ease;
}


.photo-gallery img:hover {

    transform: scale(1.03);

    box-shadow:
        0 10px 25px rgba(0,0,0,0.35);
}


/* Responsive */

@media (max-width: 1100px) {

    .photo-gallery {
        column-count: 3;
    }
}


@media (max-width: 700px) {

    .photo-gallery {
        column-count: 2;
    }
}


@media (max-width: 450px) {

    .photo-gallery {
        column-count: 1;
    }
}

</style>

</head>


<body>


<div class="gallery-header">

<h1>
GSIP Lab Gallery
</h1>


<p>

students, collaborations and everyday moments.
</p>
