<h1>GSI-P photo-gallery</h1>


<style>

.photo-gallery {

    column-count: 4;
    column-gap: 15px;
    padding: 20px;
}


.photo-gallery img {

    width: 100%;
    margin-bottom: 15px;

    border-radius: 12px;

    display: block;

    cursor: pointer;

    transition:
        transform 0.3s ease,
        box-shadow 0.3s ease;
}


.photo-gallery img:hover {

    transform: scale(1.03);

    box-shadow:
        0 10px 25px rgba(0,0,0,0.35);
}


@media (max-width: 1100px) {

    .photo-gallery {
        column-count: 3;
    }
}


@media (max-width: 700px) {

    .photo-gallery {
        column-count: 2;
    }
}


@media (max-width: 450px) {

    .photo-gallery {
        column-count: 1;
    }
}



/* Lightbox */

#lightbox {

    display: none;

    position: fixed;

    top: 0;
    left: 0;

    width: 100%;
    height: 100%;

    background: rgba(0,0,0,0.9);

    z-index: 1000;

    justify-content: center;
    align-items: center;
}


#lightbox img {

    max-width: 90%;
    max-height: 90%;

    border-radius: 12px;

    box-shadow:
        0 0 40px rgba(0,0,0,0.8);
}

</style>

<div id="lightbox">

    <img id="lightbox-img" src="">

<script>


const images =
    document.querySelectorAll(".photo-gallery img");


const lightbox =
    document.getElementById("lightbox");


const lightboxImg =
    document.getElementById("lightbox-img");



images.forEach(img => {

    img.addEventListener("click", () => {

        lightboxImg.src = img.src;

        lightbox.style.display = "flex";

    });

});



lightbox.addEventListener("click", () => {

    lightbox.style.display = "none";

});



document.addEventListener("keydown", event => {

    if (event.key === "Escape") {

        lightbox.style.display = "none";

    }

});


</script>
